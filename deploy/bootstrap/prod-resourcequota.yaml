apiVersion: v1
kind: ResourceQuota
metadata:
  name: atlas-prod-quota
  namespace: atlas-prod
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 4Gi
    limits.cpu: "8"
    limits.memory: 8Gi
    pods: "40"
    services: "20"
    configmaps: "30"
    secrets: "30"
    persistentvolumeclaims: "10"
