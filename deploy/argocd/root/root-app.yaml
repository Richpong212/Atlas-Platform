apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: atlas-root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: atlas

  source:
    repoURL: "https://github.com/Richpong212/Atlas-Platform.git"
    targetRevision: main
    path: deploy/argocd/apps

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
