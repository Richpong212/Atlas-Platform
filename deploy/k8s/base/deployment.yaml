apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlas-api
  labels:
    app.kubernetes.io/name: atlas-api
    app.kubernetes.io/part-of: atlas-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: atlas-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: atlas-api
        app.kubernetes.io/part-of: atlas-platform
    spec:
      containers:
        - name: atlas-api
          image: 307946673392.dkr.ecr.us-east-1.amazonaws.com/atlas-dev-api:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3303
          envFrom:
            - configMapRef:
                name: atlas-api-config
          readinessProbe:
            httpGet:
              path: /health
              port: 3303
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3303
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
