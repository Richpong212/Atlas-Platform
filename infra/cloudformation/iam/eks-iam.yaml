AWSTemplateFormatVersion: "2010-09-09"
Description: "IAM roles for Atlas Platform EKS"

Parameters:
  EnvironmentName:
    Type: String

  EKSClusterRoleName:
    Type: String

  EKSNodeRoleName:
    Type: String

Resources:
  EKSClusterRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref EKSClusterRoleName
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: eks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSClusterPolicy
      Tags:
        - Key: Name
          Value: !Sub atlas-${EnvironmentName}-eks-cluster-role

  EKSNodeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref EKSNodeRoleName
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
        - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy
      Tags:
        - Key: Name
          Value: !Sub atlas-${EnvironmentName}-eks-node-role

Outputs:
  EKSClusterRoleArn:
    Description: ARN of the EKS cluster IAM role
    Value: !GetAtt EKSClusterRole.Arn

  EKSNodeRoleArn:
    Description: ARN of the EKS node IAM role
    Value: !GetAtt EKSNodeRole.Arn
