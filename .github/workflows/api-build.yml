name: Atlas API Build and Push

on:
  push:
    branches:
      - main
    paths:
      - "services/atlas-api/**"
      - ".github/workflows/api-build.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: atlas-dev-api
  SERVICE_DIR: services/atlas-api

jobs:
  build-test-scan-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/atlas-api/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.SERVICE_DIR }}
        run: npm ci

      - name: Lint
        working-directory: ${{ env.SERVICE_DIR }}
        run: npm run lint

      - name: Test
        working-directory: ${{ env.SERVICE_DIR }}
        run: npm test

      - name: Build app
        working-directory: ${{ env.SERVICE_DIR }}
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

      - name: Log in to Amazon ECR
        id: login-ecr
        run: |
          aws ecr get-login-password --region "$AWS_REGION" | \
          docker login \
            --username AWS \
            --password-stdin "${{ steps.account.outputs.registry }}"

      - name: Resolve AWS account and registry
        id: account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account_id=$ACCOUNT_ID" >> "$GITHUB_OUTPUT"
          echo "registry=${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        working-directory: ${{ env.SERVICE_DIR }}
        run: |
          docker build \
            -t atlas-api:${GITHUB_SHA} \
            .

      - name: Tag Docker image for ECR
        run: |
          docker tag atlas-api:${GITHUB_SHA} \
            "${{ steps.account.outputs.registry }}/${ECR_REPOSITORY}:${GITHUB_SHA}"

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: "${{ steps.account.outputs.registry }}/${ECR_REPOSITORY}:${GITHUB_SHA}"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          severity: "CRITICAL,HIGH"

      - name: Push image to Amazon ECR
        run: |
          docker push "${{ steps.account.outputs.registry }}/${ECR_REPOSITORY}:${GITHUB_SHA}"

      - name: Show pushed image
        run: |
          echo "Pushed image:"
          echo "${{ steps.account.outputs.registry }}/${ECR_REPOSITORY}:${GITHUB_SHA}"
